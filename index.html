
<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vitwar Menu</title><link rel="stylesheet" href="style.css"></head><body><div id="splash-screen" class="splash-screen"><img src="image.png" alt="Vitwar Logo" class="splash-logo"></div><header><h1>Vitwar</h1><p>Taste the joy, live the sweetness!</p></header><main id="menu-container" class="menu-container"></main><div id="productModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeProductModal()">&times;</span><h2 id="modalProductName">اسم المنتج</h2><div id="step1"><div class="options-section"><h3>اختر الحجم (إجباري)</h3><div id="modalVariations" class="radio-group"></div></div><div class="options-section hidden" id="presentationSection"><h3>شكل التقديم (إجباري)</h3><div class="radio-group"><label class="radio-chip"><input type="radio" name="presentation" value="طبق" checked> <span>طبق</span></label><label class="radio-chip"><input type="radio" name="presentation" value="ساندوتش"> <span>ساندوتش</span></label></div></div><button class="action-btn" onclick="goToStep2()">التالي (الإضافات) ➔</button></div><div id="step2" class="hidden"><div class="options-section"><h3>الإضافات (اختياري)</h3><div id="specialAddons" class="addons-group"></div><div id="globalAddonsContainer"></div></div><div class="step-actions"><button class="action-btn secondary-btn" onclick="goToStep1()">⬅ السابق</button><button id="addToCartBtn" class="action-btn" onclick="addToCart()">أضف للسلة - <span id="modalTotalPrice">0</span> ج.م</button></div></div></div></div><div id="checkoutModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeCheckoutModal()">&times;</span><h2>إتمام الطلب</h2><div class="checkout-section"><h3>نوع الطلب</h3><div class="radio-group"><label class="radio-chip"><input type="radio" name="orderType" value="Delivery" checked onchange="toggleCafeInput()"> <span>دليفري</span></label><label class="radio-chip"><input type="radio" name="orderType" value="Pickup" onchange="toggleCafeInput()"> <span>استلام</span></label><label class="radio-chip"><input type="radio" name="orderType" value="Cafe" onchange="toggleCafeInput()"> <span>كافيه</span></label></div></div><div class="checkout-section hidden" id="cafeInputContainer"><input type="text" id="cafeName" placeholder="اكتب اسم الكافيه هنا..." class="text-input"></div><div class="checkout-section"><h3>اختر الفرع</h3><div class="radio-group"><label class="radio-chip"><input type="radio" name="branch" value="01066403999" checked> <span>التجمع الأول</span></label><label class="radio-chip"><input type="radio" name="branch" value="01080802914"> <span>التجمع الخامس</span></label></div></div><button class="action-btn submit-btn" onclick="sendOrderOnWhatsapp()">تأكيد وإرسال الطلب</button></div></div><div id="stickyCart" class="sticky-cart hidden"><div class="cart-info"><span id="cartTotalItems">0 منتج</span><span id="cartTotalPrice">0 ج.م</span></div><button class="order-now-btn" onclick="openCheckoutModal()">Order Now</button></div><script src="script.js"></script></body></html>
